<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Quét Hàng">
<title>Quét Hàng Về Kho</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#0d0d0d;color:#fff;font-family:-apple-system,sans-serif;padding-bottom:60px}
.top{background:#111;padding:16px 20px;border-bottom:1px solid #222;position:sticky;top:0;z-index:10}
.top h1{font-size:20px;font-weight:700}
.top p{font-size:12px;color:#555;margin-top:2px}
.scan-btn{display:block;margin:16px;border:none;border-radius:16px;font-size:17px;font-weight:700;cursor:pointer;width:calc(100% - 32px);overflow:hidden;position:relative}
.scan-btn label{display:block;padding:17px;background:#00e676;color:#000;cursor:pointer;text-align:center}
.scan-btn input{position:absolute;opacity:0;width:0;height:0}
.manual{margin:0 16px 16px;display:flex;gap:8px}
.manual input{flex:1;background:#1a1a1a;border:1.5px solid #2a2a2a;border-radius:14px;padding:13px 16px;color:#fff;font-size:15px;outline:none}
.manual input:focus{border-color:#00e676}
.manual button{background:#1a1a1a;border:1.5px solid #2a2a2a;border-radius:14px;padding:13px 18px;color:#fff;font-size:14px;font-weight:600;cursor:pointer}
.res{margin:0 16px 16px;border-radius:16px;padding:16px;border:1.5px solid;display:none}
.res.show{display:block;animation:pop .2s ease}
@keyframes pop{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}
.res.ok{background:#001a0a;border-color:#00e67655}
.res.err{background:#1a0000;border-color:#ff3b3055}
.res.warn{background:#1a1200;border-color:#ff980055}
.rt{font-size:15px;font-weight:700;margin-bottom:6px}
.res.ok .rt{color:#00e676}
.res.err .rt{color:#ff3b30}
.res.warn .rt{color:#ff9800}
.rb{font-size:14px;color:#888;line-height:1.8}
.rb b{color:#ddd}
.preview{margin:0 16px 16px;border-radius:16px;overflow:hidden;display:none}
.preview img{width:100%;border-radius:16px}
.hist{margin:0 16px}
.ht{font-size:11px;color:#444;text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;font-weight:600}
.hi{background:#111;border:1px solid #1e1e1e;border-radius:14px;padding:13px 15px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot.ok{background:#00e676}
.dot.err{background:#ff3b30}
.hin{flex:1;min-width:0}
.htr{font-size:13px;color:#ccc;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hn{font-size:12px;color:#555;margin-top:2px}
.htm{font-size:11px;color:#444;flex-shrink:0}
.spin{display:inline-block;width:14px;height:14px;border:2px solid #333;border-top-color:#00e676;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="top"><h1>Quét Hàng Về Kho</h1><p>eb2 — T12 / 2026 / T4</p></div>

<div class="scan-btn">
  <label for="camInput">📷 Chụp mã vạch</label>
  <input type="file" id="camInput" accept="image/*" capture="environment" onchange="handleImage(this)">
</div>

<div class="preview" id="preview"><img id="previewImg" /></div>

<div class="manual">
  <input type="text" id="inp" placeholder="Nhập tracking thủ công..." />
  <button onclick="processManual()">OK</button>
</div>

<div class="res" id="res"><div class="rt" id="rt"></div><div class="rb" id="rb"></div></div>
<div class="hist"><div class="ht">Lịch sử quét</div><div id="hl"><div style="font-size:13px;color:#333">Chưa có lịch sử</div></div></div>

<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@undecaf/zbar-wasm@0.9.15/dist/index.js"></script>
<script>
const SCRIPT_URL='https://script.google.com/macros/s/AKfycbwDEHc3d_60G5CPQgjrc__mELQWageIsldVrii6xLcEKNT0b5LMZQlkL1AYH02XsERI/exec';
let hist=[];

async function handleImage(input){
  if(!input.files||!input.files[0])return;
  const file=input.files[0];
  const url=URL.createObjectURL(file);
  document.getElementById('previewImg').src=url;
  document.getElementById('preview').style.display='block';
  show('warn','<span class="spin"></span>Đang đọc mã vạch...','');
  
  try{
    const img=new Image();
    img.src=url;
    await new Promise(r=>img.onload=r);
    
    const canvas=document.createElement('canvas');
    canvas.width=img.width;
    canvas.height=img.height;
    const ctx=canvas.getContext('2d');
    ctx.drawImage(img,0,0);
    const imageData=ctx.getImageData(0,0,canvas.width,canvas.height);
    
    const results=await zbarWasm.scanImageData(imageData);
    if(results&&results.length>0){
      const tracking=results[0].decode();
      show('warn','<span class="spin"></span>Đang xử lý...','Tracking: <b>'+tracking+'</b>');
      process(tracking);
    }else{
      show('err','Không đọc được mã','Chụp lại gần hơn và rõ hơn nhé bố!');
    }
  }catch(e){
    show('err','Lỗi đọc mã','Thử chụp lại nhé: '+e.message);
  }
  input.value='';
}

function processManual(){
  const v=document.getElementById('inp').value.trim();
  if(!v)return;
  document.getElementById('inp').value='';
  process(v);
}
document.getElementById('inp').addEventListener('keydown',e=>{if(e.key==='Enter')processManual();});

async function process(t){
  const now=new Date();
  const ng=now.getDate()+'/'+(now.getMonth()+1)+'/'+now.getFullYear()+' '+pad(now.getHours())+':'+pad(now.getMinutes());
  show('warn','<span class="spin"></span>Đang cập nhật Sheets...','Tracking: <b>'+t+'</b>');
  try{
    const url=SCRIPT_URL+'?action=updateTracking&tracking='+encodeURIComponent(t)+'&sheets=T12,2026,T4&delivered='+encodeURIComponent('Đã về kho')+'&ngayGiao='+encodeURIComponent(ng);
    const r=await fetch(url);
    const d=await r.json();
    if(d.found){
      show('ok','✓ Cập nhật thành công!','Tracking: <b>'+t+'</b><br>Sheet: <b>'+d.sheet+'</b> — Dòng <b>'+d.row+'</b><br>Ngày về kho: <b>'+ng+'</b>');
      addH('ok',t,d.sheet+' dòng '+d.row);
      if(navigator.vibrate)navigator.vibrate([80,40,80]);
    }else{
      show('err','Không tìm thấy','<b>'+t+'</b> không có trong T12, 2026, T4.');
      addH('err',t,'Không tìm thấy');
    }
  }catch(ex){
    show('err','Lỗi kết nối','Thử lại sau vài giây.');
    addH('err',t,'Lỗi kết nối');
  }
}

function pad(n){return String(n).padStart(2,'0');}
function show(type,title,body){
  const el=document.getElementById('res');
  el.className='res show '+type;
  document.getElementById('rt').innerHTML=title;
  document.getElementById('rb').innerHTML=body;
  el.scrollIntoView({behavior:'smooth',block:'nearest'});
}
function addH(s,t,n){
  const now=new Date();
  hist.unshift({s,t,n,time:pad(now.getHours())+':'+pad(now.getMinutes())});
  if(hist.length>30)hist.pop();
  renderH();
}
function renderH(){
  const el=document.getElementById('hl');
  if(!hist.length){el.innerHTML='<div style="font-size:13px;color:#333">Chưa có lịch sử</div>';return;}
  el.innerHTML=hist.map(h=>'<div class="hi"><div class="dot '+h.s+'"></div><div class="hin"><div class="htr">'+h.t+'</div><div class="hn">'+h.n+'</div></div><div class="htm">'+h.time+'</div></div>').join('');
}
</script>
</body>
</html>
