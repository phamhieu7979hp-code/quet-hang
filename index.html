<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Quan ly Hang</title>
<script src="https://cdn.jsdelivr.net/npm/dynamsoft-javascript-barcode@9.6.42/dist/dbr.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#e8f4fd;color:#1a3a5c;font-family:Arial,sans-serif;padding-bottom:20px}
.top{background:linear-gradient(135deg,#2196F3,#64B5F6);padding:16px 20px;position:sticky;top:0;z-index:10;box-shadow:0 3px 15px rgba(33,150,243,.3)}
.top h1{font-size:20px;font-weight:700;color:#fff}
.top p{font-size:11px;color:rgba(255,255,255,.7);margin-top:2px}
.tabs{display:flex;margin:14px 14px 0;gap:6px}
.tab{flex:1;padding:10px 4px;border:none;border-radius:12px;font-size:12px;font-weight:700;cursor:pointer;background:#fff;color:#90b8d8}
.tab.active{background:linear-gradient(135deg,#2196F3,#42A5F5);color:#fff}
.sec{display:none;padding:12px 0 0}.sec.active{display:block}
.sbtn{display:block;margin:0 14px 10px;border-radius:16px;overflow:hidden;width:calc(100% - 28px)}
.sbtn label{display:block;padding:15px;background:linear-gradient(135deg,#2196F3,#42A5F5);color:#fff;cursor:pointer;text-align:center;font-size:16px;font-weight:700}
.sbtn input{position:absolute;opacity:0;width:0;height:0}
.row{margin:0 14px 10px;display:flex;gap:8px}
.row input{flex:1;background:#fff;border:2px solid #BBDEFB;border-radius:12px;padding:12px 14px;color:#1a3a5c;font-size:15px;outline:none}
.row input:focus{border-color:#2196F3}
.row button{background:linear-gradient(135deg,#2196F3,#42A5F5);border:none;border-radius:12px;padding:12px 16px;color:#fff;font-size:14px;font-weight:700;cursor:pointer}
.ship{margin:0 14px 10px;display:none}
.ship label,.pi label{font-size:12px;color:#FF8F00;margin-bottom:5px;display:block;font-weight:600}
.ship .row{margin:0}.ship .row input{border-color:#FFE082}
.ship .row button{background:linear-gradient(135deg,#FFB300,#FFA000)}
.pi{margin:0 14px 10px;display:none}
.pi input{width:100%;background:#fff;border:2px solid #FFE082;border-radius:12px;padding:12px 14px;color:#1a3a5c;font-size:15px;outline:none}
.bc{display:none;margin:0 14px 10px;padding:14px;background:linear-gradient(135deg,#FFB300,#FFA000);border:none;border-radius:12px;font-size:15px;font-weight:700;color:#fff;cursor:pointer;width:calc(100% - 28px)}
.res{margin:0 14px 10px;border-radius:16px;padding:14px;display:none;box-shadow:0 4px 20px rgba(0,0,0,.08)}
.res.show{display:block}
.res.ok{background:#E3F2FD;border-left:4px solid #2196F3}
.res.err{background:#FFEBEE;border-left:4px solid #F44336}
.res.warn{background:#FFF8E1;border-left:4px solid #FFB300}
.res.info{background:#E8F5E9;border-left:4px solid #4CAF50}
.rt{font-size:14px;font-weight:700;margin-bottom:5px}
.res.ok .rt{color:#1565C0}.res.err .rt{color:#C62828}.res.warn .rt{color:#E65100}.res.info .rt{color:#2E7D32}
.rb{font-size:13px;color:#546E7A;line-height:1.8}.rb b{color:#1a3a5c}
.prbtn{display:block;margin:8px 0 0;padding:12px;background:linear-gradient(135deg,#FFB300,#FFA000);border:none;border-radius:10px;font-size:14px;font-weight:700;color:#fff;cursor:pointer;width:100%}
.divider{margin:0 14px 10px;border:none;border-top:1.5px dashed #BBDEFB}
.sec-lbl{margin:0 14px 4px;font-size:11px;color:#90b8d8;text-transform:uppercase;letter-spacing:.8px;font-weight:700}
.hist{margin:0 14px}
.ht{font-size:11px;color:#90b8d8;text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;font-weight:700}
.hi{background:#fff;border-radius:12px;padding:11px 13px;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot.ok{background:#2196F3}.dot.err{background:#F44336}
.hin{flex:1;min-width:0}
.htr{font-size:13px;color:#1a3a5c;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hn{font-size:11px;color:#90b8d8;margin-top:1px}
.htm{font-size:11px;color:#90b8d8;flex-shrink:0}
.spin{display:inline-block;width:13px;height:13px;border:2px solid #BBDEFB;border-top-color:#2196F3;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:5px}
@keyframes spin{to{transform:rotate(360deg)}}
#camModal{display:none;position:fixed;inset:0;z-index:999;background:#000;flex-direction:column}
#camModal.show{display:flex}
.dce-video-container{flex:1;width:100%;position:relative}
#camOverlay{position:absolute;top:50%;left:50%;transform:translate(-50%,-60%);width:75%;height:65px;border:3px solid #00e676;border-radius:10px;box-shadow:0 0 0 9999px rgba(0,0,0,.5);z-index:10;pointer-events:none}
#camHint{position:absolute;top:calc(50% - 80px);width:100%;text-align:center;color:#fff;font-size:13px;z-index:10;pointer-events:none}
#camClose{position:absolute;bottom:36px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,.15);color:#fff;border:2px solid rgba(255,255,255,.4);border-radius:50px;padding:13px 34px;font-size:15px;font-weight:700;cursor:pointer;z-index:10}
</style>
</head>
<body>

<div class="top">
  <h1>&#x1F4E6; Quan ly Hang</h1>
  <p>eb2 · T12 / 2026 / T4</p>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('nhap')">Nhap kho</button>
  <button class="tab" onclick="switchTab('ban')">Ban hang</button>
  <button class="tab" onclick="switchTab('gia')">Kiem tra gia</button>
</div>

<div class="sec active" id="tab-nhap">
  <div class="sbtn"><label onclick="openCam('nhap')">&#x1F4F7; Quet ma vach Tracking</label></div>
  <div class="row">
    <input type="text" id="inpNhap" placeholder="Nhap tracking...">
    <button onclick="doNhap()">OK</button>
  </div>
  <div class="ship" id="shipWrap">
    <label>Phi ship (VND)</label>
    <div class="row">
      <input type="text" id="phiShip" placeholder="0" oninput="fmt(this)" inputmode="numeric">
      <button onclick="confirmNhap()">OK</button>
    </div>
  </div>
  <div class="res" id="resNhap"><div class="rt" id="rtNhap"></div><div class="rb" id="rbNhap"></div></div>
  <div id="temWrap" style="display:none;margin:0 14px 10px">
    <button class="prbtn" onclick="inTem(curOid, window._curSp)">&#x1F5A8; In tem Order ID</button>
  </div>
  <hr class="divider">
  <div class="sec-lbl">In tem theo Order ID</div>
  <div class="row">
    <input type="text" id="inpInTem" placeholder="Nhap Order ID de in tem...">
    <button onclick="inTem(document.getElementById('inpInTem').value.trim())">In</button>
  </div>
</div>

<div class="sec" id="tab-ban">
  <div class="sbtn"><label onclick="openCam('ban')">&#x1F4F7; Quet ma vach Order ID</label></div>
  <div class="row">
    <input type="text" id="inpBan" placeholder="Nhap Order ID...">
    <button onclick="doBan()">Tim</button>
  </div>
  <div class="pi" id="pi">
    <label>Gia ban (VND)</label>
    <input type="text" id="giaBan" placeholder="0" oninput="fmt(this)" inputmode="numeric">
  </div>
  <button class="bc" id="bc" onclick="confirmBan()">Xac nhan ban</button>
  <div class="res" id="resBan"><div class="rt" id="rtBan"></div><div class="rb" id="rbBan"></div></div>
</div>

<div class="sec" id="tab-gia">
  <div class="sbtn"><label onclick="openCam('gia')">&#x1F4F7; Quet ma vach Order ID</label></div>
  <div class="row">
    <input type="text" id="inpGia" placeholder="Nhap Order ID...">
    <button onclick="doGia()">Kiem tra</button>
  </div>
  <div class="res" id="resGia"><div class="rt" id="rtGia"></div><div class="rb" id="rbGia"></div></div>
</div>

<!-- POPUP XEM TRUOC TEM -->
<div id="temPopup" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:997;align-items:center;justify-content:center;flex-direction:column;gap:14px">
  <div style="background:#fff;border-radius:20px;padding:20px;display:flex;flex-direction:column;align-items:center;gap:12px;width:80%;max-width:300px">
    <div style="font-size:13px;font-weight:700;color:#1a3a5c">Xem truoc tem</div>
    <img id="temPreview" style="width:100%;border:1px solid #eee;border-radius:8px">
    <div id="temPopupOid" style="font-family:monospace;font-size:11px;color:#666;word-break:break-all;text-align:center"></div>
    <button onclick="shareOrDownloadTem()" style="width:100%;padding:13px;background:linear-gradient(135deg,#FFB300,#FFA000);border:none;border-radius:12px;font-size:15px;font-weight:700;color:#fff;cursor:pointer">Chia se / In</button>
    <button onclick="document.getElementById('temPopup').style.display='none'" style="width:100%;padding:10px;background:#eee;border:none;border-radius:12px;font-size:14px;color:#555;cursor:pointer">Dong</button>
  </div>
</div>

<div class="hist">
  <div class="ht">Lich su</div>
  <div id="hl"><div style="font-size:13px;color:#90b8d8">Chua co lich su</div></div>
</div>

<div id="camModal">
  <div class="dce-video-container"></div>
  <div id="camOverlay"></div>
  <div id="camHint">Huong ma vach vao khung xanh</div>
  <button id="camClose" onclick="closeCam()">Dong</button>
</div>

<script>
Dynamsoft.DBR.BarcodeReader.engineResourcePath = 'https://cdn.jsdelivr.net/npm/dynamsoft-javascript-barcode@9.6.42/dist/';
Dynamsoft.DBR.BarcodeReader.productKeys = 'DLS2eyJoYW5kc2hha2VDb2RlIjoiMjAwMDAxLTE2NDk4Mjk3OTI2MzUiLCJvcmdhbml6YXRpb25JRCI6IjIwMDAwMSIsInNlc3Npb25QYXNzd29yZCI6IndTcGR6Vm05WDJrcEQ5YUoifQ==';

var BASE = 'https://script.google.com/macros/s/AKfycbzzYg6xvLx7cgh0TMfYMYqD6VGHaBC5GDl1MlYLwranrfTl1B4Kk7q0C_ft5yTKZJEU/exec';
var hist = [], cT = null, cInfo = null, nT = null, nInfo = null, nNg = null, curOid = '';
var camTab = '', scanner = null;

// Init Dynamsoft scanner
async function initScanner() {
  if (scanner) return;
  try {
    scanner = await Dynamsoft.DBR.BarcodeScanner.createInstance();
    var s = await scanner.getRuntimeSettings();
    s.barcodeFormatIds = Dynamsoft.DBR.EnumBarcodeFormat.BF_CODE_128
      | Dynamsoft.DBR.EnumBarcodeFormat.BF_CODE_39
      | Dynamsoft.DBR.EnumBarcodeFormat.BF_EAN_13;
    s.expectedBarcodesCount = 1;
    await scanner.updateRuntimeSettings(s);
    await scanner.setUIElement(document.getElementById('camModal'));
    scanner.onFrameRead = function() {};
    scanner.onUnduplicatedRead = function(txt) {
      closeCam();
      onScanned(txt.trim());
    };
  } catch(e) { scanner = null; }
}
initScanner();

function switchTab(t) {
  document.querySelectorAll('.tab').forEach(function(el,i){ el.classList.toggle('active',['nhap','ban','gia'][i]===t); });
  document.querySelectorAll('.sec').forEach(function(s){ s.classList.remove('active'); });
  document.getElementById('tab-'+t).classList.add('active');
}

function fmt(el){ var v=el.value.replace(/[^0-9]/g,''); el.value=v?Number(v).toLocaleString('vi-VN'):''; }
function raw(id){ return parseFloat((document.getElementById(id).value||'0').replace(/[^0-9]/g,''))||0; }
function pad(n){ return String(n).padStart(2,'0'); }

function showRes(id,type,title,body){
  var sfx=id.replace('res','');
  document.getElementById(id).className='res show '+type;
  document.getElementById('rt'+sfx).innerHTML=title;
  document.getElementById('rb'+sfx).innerHTML=body;
}

async function openCam(tab) {
  camTab = tab;
  if (!scanner) await initScanner();
  if (!scanner) { alert('Khong khoi dong duoc scanner!'); return; }
  document.getElementById('camModal').classList.add('show');
  try { await scanner.open(); }
  catch(e) { alert('Loi camera: ' + e.message); closeCam(); }
}

function closeCam() {
  document.getElementById('camModal').classList.remove('show');
  if (scanner) { try { scanner.close(); } catch(e) {} }
}

function onScanned(t) {
  if (navigator.vibrate) navigator.vibrate(100);
  if (camTab==='nhap') findTracking(t);
  else if (camTab==='ban') findBan(t);
  else if (camTab==='gia') findGia(t);
}

function inTem(oid, sp) {
  if (!oid) { alert('Chua co Order ID!'); return; }
  var W = 330, H = 208;
  var canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  var ctx = canvas.getContext('2d');
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, W, H);
  // Ten san pham
  if (sp) {
    ctx.fillStyle = '#000';
    ctx.font = 'bold 15px Arial';
    ctx.textAlign = 'center';
    // Wrap text neu qua dai
    var words = sp.split(' '), line = '', lines = [];
    for (var i = 0; i < words.length; i++) {
      var test = line + (line ? ' ' : '') + words[i];
      if (ctx.measureText(test).width > W - 16) { if (line) lines.push(line); line = words[i]; }
      else line = test;
    }
    if (line) lines.push(line);
    lines = lines.slice(0, 2); // toi da 2 dong
    lines.forEach(function(l, i) { ctx.fillText(l, W/2, 18 + i*17); });
  }
  // Barcode SVG - nho hon
  var svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.style.position = 'absolute'; svg.style.left = '-9999px';
  document.body.appendChild(svg);
  try {
    JsBarcode(svg, oid, {format:'CODE128', width:1.8, height:90, displayValue:false, margin:3});
  } catch(e) { document.body.removeChild(svg); alert('Loi tao barcode!'); return; }
  var svgData = new XMLSerializer().serializeToString(svg);
  document.body.removeChild(svg);
  var img = new Image();
  var blob = new Blob([svgData], {type:'image/svg+xml;charset=utf-8'});
  var svgUrl = URL.createObjectURL(blob);
  img.src = svgUrl;
  img.onload = function() {
    var topOffset = sp ? 38 : 6;
    ctx.drawImage(img, 10, topOffset, W-20, 120);
    URL.revokeObjectURL(svgUrl);
    ctx.fillStyle = '#000';
    ctx.font = '14px monospace';
    ctx.textAlign = 'center';
    var shortOid = oid.length > 32 ? oid.substring(0,32)+'...' : oid;
    ctx.fillText(shortOid, W/2, topOffset + 130);
    var dataUrl = canvas.toDataURL('image/png');
    document.getElementById('temPreview').src = dataUrl;
    document.getElementById('temPopupOid').textContent = oid;
    document.getElementById('temPopup').style.display = 'flex';
    canvas.toBlob(function(pngBlob) {
      window._temBlob = pngBlob;
      window._temOid = oid;
    }, 'image/png');
  };
}

function shareOrDownloadTem() {
  var pngBlob = window._temBlob;
  var oid = window._temOid;
  if (!pngBlob) return;
  var file = new File([pngBlob], 'tem_'+oid+'.png', {type:'image/png'});
  if (navigator.share && navigator.canShare({files:[file]})) {
    navigator.share({files:[file], title:'Tem '+oid})
    .catch(function(e){ if(e.name!=='AbortError') alert('Loi share: '+e.message); });
  } else {
    var a = document.createElement('a');
    a.href = URL.createObjectURL(pngBlob);
    a.download = 'tem_'+oid+'.png';
    a.click();
  }
  document.getElementById('temPopup').style.display = 'none';
}

function doNhap(){ var v=document.getElementById('inpNhap').value.trim(); if(v){document.getElementById('inpNhap').value='';findTracking(v);} }
document.getElementById('inpNhap').addEventListener('keydown',function(e){if(e.key==='Enter')doNhap();});
document.getElementById('phiShip').addEventListener('keydown',function(e){if(e.key==='Enter')confirmNhap();});
document.getElementById('inpInTem').addEventListener('keydown',function(e){if(e.key==='Enter'){var v=document.getElementById('inpInTem').value.trim();if(v)inTem(v);}});

async function findTracking(t) {
  var now=new Date(), ng=now.getDate()+'/'+(now.getMonth()+1)+'/'+now.getFullYear();
  showRes('resNhap','warn','<span class="spin"></span>Dang tim...','Tracking: <b>'+t+'</b>');
  try {
    var r=await fetch(BASE+'?action=updateTracking&tracking='+encodeURIComponent(t)+'&sheets=T12,2026,T4&delivered=Da+ve+kho&ngayGiao='+encodeURIComponent(ng)+'&checkOnly=1');
    var d=await r.json();
    if(d.found){
      nT=t;nInfo=d;nNg=ng;curOid=d.orderId||'';
      var spTxt = d.sp ? '<br>SP: <b>'+d.sp+'</b>' : ''; showRes('resNhap','info','Tim thay! Nhap phi ship','Tracking: <b>'+t+'</b>'+spTxt+'<br>Sheet: <b>'+d.sheet+'</b> dong <b>'+d.row+'</b>');
      document.getElementById('shipWrap').style.display='block';
      document.getElementById('phiShip').focus();
    }else{ showRes('resNhap','err','Khong tim thay','<b>'+t+'</b> khong co.'); addH('err',t,'Khong tim thay'); }
  }catch(ex){ showRes('resNhap','err','Loi ket noi','Thu lai sau.'); }
}

async function confirmNhap() {
  if(!nT)return;
  var ps=raw('phiShip');
  document.getElementById('shipWrap').style.display='none';
  document.getElementById('phiShip').value='';
  var t=nT,d=nInfo,ng=nNg;nT=null;nInfo=null;nNg=null;
  try{
    var r=await fetch(BASE+'?action=updateTracking&tracking='+encodeURIComponent(t)+'&sheets=T12,2026,T4&delivered=Da+ve+kho&ngayGiao='+encodeURIComponent(ng)+'&phiShip='+ps);
    var res=await r.json();
    if(res.found){
      curOid=res.orderId||t; window._curSp=res.sp||'';
      var psStr=ps>0?'<br>Phi ship: <b>'+ps.toLocaleString('vi')+' d</b>':'';
      showRes('resNhap','ok','Cap nhat thanh cong!','Tracking: <b>'+t+'</b><br>Sheet: <b>'+d.sheet+'</b> dong <b>'+d.row+'</b><br>Ngay ve: <b>'+ng+'</b>'+psStr);
      document.getElementById('temWrap').style.display='block'; window._curSp = res.sp||'';
      addH('ok',t,'Nhap kho'+(ps>0?' | '+ps.toLocaleString('vi')+' d':''));
      if(navigator.vibrate)navigator.vibrate([80,40,80]);
    }else showRes('resNhap','err','Loi','Khong cap nhat duoc.');
  }catch(ex){ showRes('resNhap','err','Loi ket noi','Thu lai sau.'); }
}

function doBan(){ var v=document.getElementById('inpBan').value.trim(); if(v)findBan(v); }
document.getElementById('inpBan').addEventListener('keydown',function(e){if(e.key==='Enter')doBan();});
document.getElementById('giaBan').addEventListener('keydown',function(e){if(e.key==='Enter')confirmBan();});

async function findBan(orderId) {
  showRes('resBan','warn','<span class="spin"></span>Dang tim may...','Order ID: <b>'+orderId+'</b>');
  try{
    var r=await fetch(BASE+'?action=timMay&orderId='+encodeURIComponent(orderId));
    var d=await r.json();
    if(d.found){
      if(d.daBan){showRes('resBan','err','Da ban roi!','Order ID: <b>'+orderId+'</b> da ban truoc do!');addH('err',orderId,'Da ban roi');return;}
      cT=orderId;cInfo=d;
      showRes('resBan','info','Tim thay!','SP: <b>'+d.sp+'</b><br>Sheet: <b>'+d.sheet+'</b>');
      document.getElementById('pi').style.display='block';
      document.getElementById('bc').style.display='block';
      document.getElementById('giaBan').focus();
    }else{ showRes('resBan','err','Khong tim thay','Order ID: <b>'+orderId+'</b> khong co.'); cT=null;cInfo=null; }
  }catch(ex){ showRes('resBan','err','Loi ket noi','Thu lai sau.'); }
}

async function confirmBan() {
  if(!cT||!cInfo)return;
  var gb=raw('giaBan');
  if(!gb){alert('Chua nhap gia ban!');return;}
  showRes('resBan','warn','<span class="spin"></span>Dang cap nhat...','');
  try{
    var r=await fetch(BASE+'?action=banHang&orderId='+encodeURIComponent(cT)+'&giaBan='+gb+'&sheet='+encodeURIComponent(cInfo.sheet)+'&row='+cInfo.row);
    var d=await r.json();
    if(d.success){
      showRes('resBan','ok','Ban thanh cong!','Order ID: <b>'+cT+'</b><br>Gia ban: <b>'+gb.toLocaleString('vi')+' d</b>');
      addH('ok',cT,'Ban '+gb.toLocaleString('vi')+' d');
      if(navigator.vibrate)navigator.vibrate([80,40,80]);
      document.getElementById('pi').style.display='none';
      document.getElementById('bc').style.display='none';
      document.getElementById('giaBan').value='';
      document.getElementById('inpBan').value='';
      cT=null;cInfo=null;
    }else if(d.daBan)showRes('resBan','err','Da ban roi!','Order ID nay da ban truoc do!');
    else showRes('resBan','err','Loi','Khong cap nhat duoc.');
  }catch(ex){ showRes('resBan','err','Loi ket noi','Thu lai sau.'); }
}

function doGia(){ var v=document.getElementById('inpGia').value.trim(); if(v)findGia(v); }
document.getElementById('inpGia').addEventListener('keydown',function(e){if(e.key==='Enter')doGia();});

async function findGia(orderId) {
  showRes('resGia','warn','<span class="spin"></span>Dang tim...','Order ID: <b>'+orderId+'</b>');
  try{
    var r=await fetch(BASE+'?action=timMay&orderId='+encodeURIComponent(orderId));
    var d=await r.json();
    if(d.found){
      var tt=d.daBan?"<b style='color:#C62828'>Da ban roi</b>":"<b style='color:#2E7D32'>Chua ban</b>";
      showRes('resGia','info','Tim thay!','Order ID: <b>'+orderId+'</b><br>SP: <b>'+d.sp+'</b><br>Gia nhap: <b>'+Number(d.giaNhap).toLocaleString('vi')+' d</b><br>Trang thai: '+tt);
    }else showRes('resGia','err','Khong tim thay','<b>'+orderId+'</b> khong co.');
  }catch(ex){ showRes('resGia','err','Loi ket noi','Thu lai sau.'); }
}

function addH(s,t,n){
  var now=new Date();
  hist.unshift({s:s,t:t,n:n,time:pad(now.getHours())+':'+pad(now.getMinutes())});
  if(hist.length>30)hist.pop();
  renderH();
}
function renderH(){
  var el=document.getElementById('hl');
  if(!hist.length){el.innerHTML='<div style="font-size:13px;color:#90b8d8">Chua co lich su</div>';return;}
  el.innerHTML=hist.map(function(h){
    return '<div class="hi"><div class="dot '+h.s+'"></div><div class="hin"><div class="htr">'+h.t+'</div><div class="hn">'+h.n+'</div></div><div class="htm">'+h.time+'</div></div>';
  }).join('');
}
</script>
